<div class="client-root">
  <header class="client-header">
    <span class="header-name">{{ player()?.playerName }}</span>
    <span class="header-score">{{ getTotalScore() }} 🐂</span>
  </header>

  <div class="client-body">
    <app-joined-page      *ngIf="view() === 'waiting'"></app-joined-page>
    <app-card-select      *ngIf="view() === 'cards'"></app-card-select>
    <app-game-review-client *ngIf="view() === 'review'"></app-game-review-client>
  </div>
</div>
