<div class="review-client-wrapper">
  <ng-container *ngIf="isFirst(); else waiting">
    <p class="prompt">Round complete! Start the next one?</p>
    <button class="btn-gold" [disabled]="!canStart()" (click)="nextRound()">
      Next Round
    </button>
  </ng-container>
  <ng-template #waiting>
    <div class="spinner-ring"></div>
    <p class="waiting-text">Waiting for host to start next round…</p>
  </ng-template>
</div>
