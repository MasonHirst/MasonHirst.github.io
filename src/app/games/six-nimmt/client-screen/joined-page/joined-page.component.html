<div class="waiting-wrapper">
  <div class="waiting-content" *ngIf="!isFirst()">
    <div class="spinner-ring"></div>
    <p class="waiting-text">Waiting for the host to start the game…</p>
    <p class="player-count">{{ playerCount() }} player{{ playerCount() === 1 ? '' : 's' }} joined</p>
  </div>

  <div class="host-start" *ngIf="isFirst()">
    <p class="player-count">{{ playerCount() }} player{{ playerCount() === 1 ? '' : 's' }} joined</p>
    <button class="start-btn" [disabled]="!canStart()" (click)="startGame()">
      Start Game
    </button>
    <p class="hint" *ngIf="!canStart()">Need at least 2 players</p>
  </div>
</div>
