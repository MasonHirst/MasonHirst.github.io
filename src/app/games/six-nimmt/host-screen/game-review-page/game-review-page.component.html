<div class="review-wrapper">
  <h2 class="review-title">{{ gameOver() ? 'Game Over' : 'Round Complete' }}</h2>

  <!-- Score table -->
  <div class="score-table-wrap">
    <table class="score-table">
      <thead>
        <tr>
          <th>Player</th>
          <th *ngFor="let r of rounds()">R{{ r + 1 }}</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let player of players()">
          <td class="player-col">{{ player.playerName }}</td>
          <td *ngFor="let r of rounds()" [class.bad-round]="getRoundScore(player, r) >= 10">
            {{ getRoundScore(player, r) }}
          </td>
          <td class="total-col" [class.loser]="gameOver() && getTotalScore(player) >= 66">
            {{ getTotalScore(player) }}
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="game-over-msg" *ngIf="gameOver()">
    <p>Anyone reaching 66 🐂 loses. Start a fresh game!</p>
  </div>

  <div class="actions">
    <button class="btn-gold" *ngIf="!gameOver()" (click)="startNextRound()">Next Round</button>
    <button class="btn-outline" (click)="startFreshGame()">New Game</button>
    <button class="btn-danger" (click)="endGame()">End Game</button>
  </div>
</div>
