<div class="table-layout">

  <!-- ── Game state label ── -->
  <div class="state-bar">
    <span class="state-label">{{ showGameState() }}</span>
  </div>

  <!-- ── Table stacks (left) ── -->
  <section class="stacks-section">
    <div
      *ngFor="let stack of localStacks(); let i = index"
      class="stack-row"
      [id]="'stack-row-' + i"
    >
      <span class="row-number">{{ i + 1 }}</span>
      <div class="stack-cards">
        <div
          *ngFor="let slotIdx of slotIndices"
          class="stack-slot"
          [class.filled]="isSlotSettled(stack, slotIdx)"
        >
          <app-nimmt-card
            *ngIf="getSlotCard(stack, slotIdx) as card"
            [id]="'card-' + card.number"
            [card]="card"
            [height]="120"
            [selectable]="false"
          ></app-nimmt-card>
        </div>
      </div>
    </div>
  </section>

  <!-- ── Player panels (right) ── -->
  <section class="players-section">
    <div
      *ngFor="let player of sortedPlayers(); trackBy: trackByToken"
      class="player-panel"
      [id]="'player-panel-' + player.userToken"
      [class.active]="activeToken() === player.userToken"
      [class.awaiting-row-pick]="pausedForToken() === player.userToken"
    >
      <!-- Floating indicator: this player must choose a row -->
      <div class="pick-row-badge" *ngIf="pausedForToken() === player.userToken">
        Choosing row…
      </div>
      <!-- Player info -->
      <div class="player-info">
        <span class="player-name">{{ player.playerName }}</span>
        <span class="player-score-row">
          <span class="round-score" [class.hot]="getRoundScore(player) >= 5">
            {{ getRoundScore(player) }}<span class="bull-icon-inline"></span>
          </span>
          <span class="total-score">Total: {{ getTotalScore(player) }}</span>
        </span>
      </div>

      <!-- Selected card slot -->
      <div class="player-card-slot" [id]="'player-slot-' + player.userToken">
        <ng-container *ngIf="player.selectedCard && !player.cardIsStacked">
          <app-nimmt-card
            [id]="'card-' + player.selectedCard.number"
            [card]="player.selectedCard"
            [height]="65"
            [selectable]="false"
            [faceDown]="!cardsRevealed()"
          ></app-nimmt-card>
        </ng-container>
        <!-- Waiting indicator: player hasn't selected yet -->
        <div
          class="waiting-dot"
          *ngIf="!player.selectedCard && !player.cardIsStacked && gameState() === 'PICKING_CARDS'"
        ></div>
      </div>
    </div>
  </section>

</div>
