<div class="join-wrapper">
  <h1 class="game-title">6-Nimmt!</h1>

  <div class="code-block" (click)="copyCode()" title="Click to copy">
    <span class="code-label">Game Code</span>
    <span class="code-value">{{ gameData()?.code }}</span>
    <span class="code-hint">click to copy</span>
  </div>

  <div class="players-section">
    <h3 class="section-heading">Players ({{ players().length }}/10)</h3>
    <div class="player-list">
      <div class="player-row" *ngFor="let player of players()">
        <span class="player-name">{{ player.playerName }}</span>
        <button class="kick-btn" (click)="kickPlayer(player.userToken)">✕</button>
      </div>
      <div class="empty-hint" *ngIf="players().length === 0">
        Waiting for players to join…
      </div>
    </div>
  </div>

  <button
    class="start-btn"
    [disabled]="!canStart()"
    (click)="startGame()"
  >
    Start Game
  </button>
  <p class="min-players-hint" *ngIf="!canStart()">Need at least 2 players</p>
</div>
