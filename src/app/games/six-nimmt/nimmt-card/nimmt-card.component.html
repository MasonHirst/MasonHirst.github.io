<div
  class="card-scene"
  [style.width.px]="width"
  [style.height.px]="height"
  (click)="handleClick()"
  [class.selectable]="selectable"
  [class.selected]="selected"
>
  <div class="card-inner" [class.flipped]="faceDown">

    <!-- Front face -->
    <div
      class="card-face card-front"
      *ngIf="card"
      [attr.data-bullheads]="card.bullHeads"
    >
      <!-- Top row: number top-left, mini bulls top-right -->
      <div class="card-corner top">
        <span class="corner-number" [style.font-size.px]="height * 0.12">
          {{ card.number }}
        </span>
        <div
          class="corner-bulls"
          [style.width.px]="cornerBullsWidth"
        >
          <span
            *ngFor="let _ of bullHeads"
            class="mini-bull"
            [style.width.px]="miniBullSize"
            [style.height.px]="miniBullSize"
          ></span>
        </div>
      </div>

      <!-- Center: big bull silhouette with large number overlaid -->
      <div class="card-center">
        <div class="big-bull"></div>
        <span
          class="big-number"
          [style.font-size.px]="height * 0.38"
          [style.-webkit-text-stroke-width.px]="height * 0.025"
        >{{ card.number }}</span>
      </div>

      <!-- Bottom row (rotated 180): bulls become bottom-left, number becomes bottom-right -->
      <div class="card-corner bottom">
        <span class="corner-number" [style.font-size.px]="height * 0.12">
          {{ card.number }}
        </span>
        <div
          class="corner-bulls"
          [style.width.px]="cornerBullsWidth"
        >
          <span
            *ngFor="let _ of bullHeads"
            class="mini-bull"
            [style.width.px]="miniBullSize"
            [style.height.px]="miniBullSize"
          ></span>
        </div>
      </div>
    </div>

    <!-- Empty card face (no card data) -->
    <div class="card-face card-front card-empty" *ngIf="!card"></div>

    <!-- Back face -->
    <div class="card-face card-back">
      <div class="card-back-pattern"></div>
    </div>

  </div>
</div>
